id = "sniffr"
name = "herdr-sniffr"
version = "0.8.0"
min_herdr_version = "0.7.0"
description = "AI pre-review: point it at a GitHub PR → opens it in your terminal reviewer (tuicr/hunk) and an agent drops draft comments on the risky lines before you read. Comments stay local until you submit."
platforms = ["macos", "linux"]

# Runs on `herdr plugin install`: bootstraps the standalone `sniffr` engine
# (github.com/tomasvarga/sniffr — a plain CLI, not a plugin) and links the herdr
# launcher onto your PATH as `sniffr`. The launcher opens the reviewer pane and
# delegates the review to the engine.
[[build]]
command = ["bash", "install.sh"]

# Optional: bind a key to sniffr.sniff-clipboard to pre-review the PR URL on your
# clipboard. (No link_handler here on purpose — that's herdr-pickr's job; sniffr
# is offered inside pickr's chooser, so the two don't fight over PR links.)
[[actions]]
id = "sniff-clipboard"
title = "sniffr: pre-review PR from clipboard"
command = ["bash", "bin/sniffr-clip"]
