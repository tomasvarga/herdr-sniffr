# sniffr config — copy to ~/.config/sniffr/config.toml
#
# Chooses where the agent's findings are delivered. With NO config, sniffr uses
# the "tuicr" backend — so you only need this file to switch backends or add
# custom ones. Precedence: `--backend` flag > SNIFFR_BACKEND env > this file > tuicr.

# Built-in backends: "tuicr" (default) and "hunk".
backend = "tuicr"

# --- Review tuning ----------------------------------------------------------
# `prompt` customizes WHAT the agent looks for. sniffr always appends the
# machine-readable output contract itself, so DON'T describe the JSON format
# here — just the review focus/persona. Omit to use the built-in default
# ("senior code reviewer … high-signal findings only, no nits").
#
# prompt = """
# You are a security-focused reviewer. Prioritize auth, input validation, and
# secrets. Flag perf regressions. Ignore style and formatting entirely.
# """
#
# max = 8   # cap on findings per review (SNIFFR_MAX env overrides)

# model = "gpt-5.6-codex-high"   # model for the agent (--model flag / SNIFFR_MODEL
#                           # env override; unset = the agent's own default/auto)

# --- Review pane ------------------------------------------------------------
# How sniffr opens the reviewer inside herdr. Defaults: a right-hand split.
# [pane]
# placement = "split"   # "split" (side-by-side) or "zoom" (maximize the reviewer)
# direction = "right"   # split direction: "right" or "down"
# ratio     = 0.5        # split size, 0.0–1.0

# --- Custom backends --------------------------------------------------------
# Define your own review tool as a backend. sniffr resolves the agent's findings
# (a JSON array of {file, line, type, body}, line-anchored by content), then:
#   • runs `open`   to launch the viewer in a herdr split (optional)
#   • runs `inject` with the findings JSON piped to its stdin
# Placeholders expanded in both commands: {url} {repo} {num} {diff} {pane}
#   {diff} = path to the PR's unified-diff file · {pane} = the herdr pane id
#
# Example — a reviewer that opens by URL and imports findings from stdin:
#
# [backends.myreviewr]
# open   = "myreviewr open {url}"
# inject = "myreviewr import --stdin"
#
# Example — no viewer, just write the findings to a sidecar file:
#
# [backends.sidecar]
# inject = "cat > /tmp/findings-{num}.json"
